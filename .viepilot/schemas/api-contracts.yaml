openapi: 3.1.0
info:
  title: ViePilot Local Control Contracts
  version: 3.0.0-alpha
  description: >
    Reference-only contract for local command-style interactions. ViePilot does not
    currently expose a deployed HTTP API; these paths document semantic command inputs.
servers:
  - url: local://viepilot
paths:
  /commands/request:
    post:
      summary: Route a user intent into the correct planning or execution path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        "200":
          description: Routed intent
  /commands/crystallize:
    post:
      summary: Run extraction and compile stages for the canonical planning-source artifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [extract, generate]
      responses:
        "200":
          description: planning-source.json updated or runtime/projection artifacts generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  planning_source:
                    type: string
                    const: .viepilot/planning-source.json
                  runtime_artifacts:
                    type: array
                    items:
                      type: string
                      enum: [runtime-state.json, execution-graph.json, active-packet.json, compat-map.json]
  /commands/auto:
    post:
      summary: Execute the current active packet from runtime-state.json + execution-graph.json + active-packet.json
      responses:
        "200":
          description: Execution outcome with refreshed runtime state and packet lifecycle
x-local-only: true
